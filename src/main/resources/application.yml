spring:
  application:
    name: aegis # 应用名称
  servlet: # 文件上传配置
    multipart:
      max-file-size: 100MB # 上传文件大小限制
      max-request-size: 100MB # 上传文件总大小限制
  data:
    redis:
      host: 127.0.0.1 # 地址(需要改成你的Redis地址)
      port: 6379 # 端口
      password: aegis # 密码(需要改成你的Redis密码)
      database: 1 # Redis数据库索引
      lettuce:
        pool: # Redis连接池配置
          max-idle: 16 # 连接池中的最大空闲连接
          min-idle: 8 # 连接池中的最小空闲连接
          max-active: 32 # 最大连接数

  datasource: # 数据库配置
    url: jdbc:mysql://127.0.0.1:3306/aegis?serverTimezone=Asia/Shanghai&useSSL=false # 连接地址(需要改成你的MySQL地址)
    username: root # 账号(需要改成你的MySQL账号)
    password: aegis # 密码(需要改成你的MySQL密码)
    driver-class-name: com.mysql.cj.jdbc.Driver # 驱动
    hikari:
      # 连接池核心配置
      minimum-idle: 10           # 最小空闲连接数，保持一定连接数量减少延迟
      maximum-pool-size: 50      # 最大连接数，根据业务并发调整
      idle-timeout: 600000       # 空闲连接最大存活时间 10 分钟
      max-lifetime: 1800000      # 连接最大生命周期 30 分钟，避免 MySQL 超时
      connection-timeout: 30000  # 获取连接超时时间 30 秒
      pool-name: HikariPool-Prod # 连接池名字，便于监控
      # 测试连接有效性
      validation-timeout: 5000   # 验证连接的超时时间
      leak-detection-threshold: 20000 # 连接泄漏检测阈值 20 秒
      connection-test-query: SELECT 1 # 检查连接是否可用的 SQL
  mail: # 邮件配置
    host: smtp.163.com # 协议服务器地址(需要改成你的邮箱的SMTP服务器地址)
    port: 25 # 端口
    protocol: smtp # 协议
    default-encoding: UTF-8 # 编码
    username: aegis_system@163.com # 账号(需要改成你的邮箱账号)
    password: aegis # 授权码(需要改成你的邮箱授权码)
  freemarker: # freemarker配置
    cache: false # 开发环境设置为false，生产环境设置为true
    charset: UTF-8 # 文件编码
    check-template-location: true # 检查模板位置
    content-type: text/html # 内容类型
    suffix: .ftl # 模版后缀名 默认为ftl
    template-loader-path: classpath:/templates/ # 邮件模板路径

mybatis-plus:
  mapper-locations: classpath*:com/aegis/modules/**/mapper/*Mapper.xml # 映射xml文件
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted # 全局逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0

file:
  upload:
    # 当前使用的存储平台: LOCAL,MINIO,ALIYUN_OSS,TENCENT_COS
    platform: LOCAL
    # 本地存储配置
    local:
      path: /opt/uploads/
      secret-key: local-file-secret-key
    # Minio配置
    minio:
      endpoint: http://127.0.0.1:9000
      access-key: your-access-key
      secret-key: your-secret-key
      bucket-name: your-bucket-name
    # 阿里云OSS配置
    aliyun:
      endpoint: https://oss-cn-hangzhou.aliyuncs.com
      access-key-id: your-access-key-id
      access-key-secret: your-access-key-secret
      bucket-name: your-bucket-name
    # 腾讯云COS配置
    tencent:
      region: ap-beijing
      secret-id: your-secret-id
      secret-key: your-secret-key
      bucket-name: your-bucket-name

# JWT配置
jwt:
  issuer: aegis
  secret: mySecretKeyForJWTTokenGenerationThatShouldBeLongEnough
  access-token-expiration: 900  # 15分钟
  refresh-token-expiration: 604800  # 7天

springdoc:
  swagger-ui:
    enabled: true # 是否启用swagger-ui
    tryItOutEnabled: true # 是否启用"Try it out"按钮
    filter: true # 是否启用过滤器
    display-request-duration: true # 是否显示请求持续时间
  api-docs:
    enabled: true # 是否启用api-docs
  cache:
    disabled: true  # 开发时禁用缓存，便于实时更新

task:
  scheduling:
    enabled: true # 是否启用定时任务

logging:
  file:
    path: ./logs # 日志路径
  level:
    com.aegis: DEBUG
    springfox.documentation.spring.web.readers.operation: ERROR
