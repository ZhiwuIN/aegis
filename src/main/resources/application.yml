server:
  port: ${SERVER_PORT:8088} # 应用端口

spring:
  application:
    name: aegis # 应用名称
  servlet: # 文件上传配置
    multipart:
      max-file-size: ${MAX_FILE_SIZE:100MB} # 上传文件大小限制
      max-request-size: ${MAX_REQUEST_SIZE:100MB} # 上传文件总大小限制
  data:
    redis: # Redis配置
      host: ${REDIS_HOST:127.0.0.1} # 地址
      port: ${REDIS_PORT:6379} # 端口
      password: ${REDIS_PASSWORD:} # 密码
      database: ${REDIS_DATABASE:1} # Redis数据库索引
      lettuce:
        pool: # Redis连接池配置
          max-idle: 16 # 连接池中的最大空闲连接
          min-idle: 8 # 连接池中的最小空闲连接
          max-active: 32 # 最大连接数

  datasource: # 数据库配置
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/aegis?serverTimezone=Asia/Shanghai&useSSL=false} # 连接地址
    username: ${MYSQL_USERNAME:root} # 账号
    password: ${MYSQL_PASSWORD:} # 密码
    driver-class-name: com.mysql.cj.jdbc.Driver # 驱动
    hikari:
      # 连接池核心配置
      minimum-idle: 10           # 最小空闲连接数，保持一定连接数量减少延迟
      maximum-pool-size: 50      # 最大连接数，根据业务并发调整
      idle-timeout: 600000       # 空闲连接最大存活时间 10 分钟
      max-lifetime: 1800000      # 连接最大生命周期 30 分钟，避免 MySQL 超时
      connection-timeout: 30000  # 获取连接超时时间 30 秒
      pool-name: HikariPool-Aegis # 连接池名字，便于监控
      # 测试连接有效性
      validation-timeout: 5000   # 验证连接的超时时间
      leak-detection-threshold: 20000 # 连接泄漏检测阈值 20 秒
      connection-test-query: SELECT 1 # 检查连接是否可用的 SQL
  mail: # 邮件配置
    host: ${MAIL_HOST:smtp.163.com} # 协议服务器地址
    port: ${MAIL_PORT:465} # 端口
    protocol: smtp # 协议
    default-encoding: UTF-8 # 编码
    username: ${MAIL_USERNAME:} # 账号
    password: ${MAIL_PASSWORD:} # 授权码
    properties:
      mail:
        smtp:
          auth: true # 是否需要身份验证
          ssl:
            enable: true # 是否启用SSL
          connection-timeout: 10000 # 连接超时
          timeout: 10000 # 读取超时
          write-timeout: 10000 # 写入超时
  freemarker: # freemarker配置
    cache: ${FREEMARKER_CACHE:false} # 缓存（生产环境建议设置为true）
    charset: UTF-8 # 文件编码
    check-template-location: true # 检查模板位置
    content-type: text/html # 内容类型
    suffix: .ftl # 模版后缀名 默认为ftl
    template-loader-path: classpath:/templates/ # 邮件模板路径

mybatis-plus:
  mapper-locations: classpath*:com/aegis/modules/**/mapper/*Mapper.xml # 映射xml文件
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted # 全局逻辑删除字段名
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0

file:
  upload:
    # 当前使用的存储平台: LOCAL,MINIO,ALIYUN_OSS,TENCENT_COS
    platform: ${FILE_PLATFORM:LOCAL}
    # 本地存储配置
    local:
      path: ${FILE_LOCAL_PATH:/opt/uploads/}
      secret-key: ${FILE_LOCAL_SECRET_KEY:changeme-local-file-secret-key}
    # Minio配置
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket-name: ${MINIO_BUCKET_NAME:}
    # 阿里云OSS配置
    aliyun:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    # 腾讯云COS配置
    tencent:
      region: ${TENCENT_COS_REGION:}
      secret-id: ${TENCENT_COS_SECRET_ID:}
      secret-key: ${TENCENT_COS_SECRET_KEY:}
      bucket-name: ${TENCENT_COS_BUCKET_NAME:}

# JWT配置
jwt:
  issuer: aegis
  secret: ${JWT_SECRET:changeme-in-production-use-a-long-random-string}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}  # 15分钟
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}  # 7天

# 安全登录配置
security:
  login:
    enable-captcha: true # 是否启用滑块验证码校验
    enable-password-encryption: true # 是否启用密码加密
    cookie-secure: ${COOKIE_SECURE:false} # Cookie Secure标志（生产环境应设为true）

springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_PRODUCTION:false} # 是否启用swagger-ui
    tryItOutEnabled: true # 是否启用"Try it out"按钮
    filter: true # 是否启用过滤器
    display-request-duration: true # 是否显示请求持续时间
  api-docs:
    enabled: ${SPRINGDOC_PRODUCTION:false} # 是否启用api-docs
  cache:
    disabled: ${SPRINGDOC_PRODUCTION:false}  # 开发时禁用缓存，便于实时更新

task:
  scheduling:
    enabled: ${TASK_SCHEDULING_ENABLED:true} # 是否启用定时任务

# 演示模式配置（用于保护演示环境数据）
demo:
  reset:
    enabled: ${DEMO_RESET_ENABLED:false}   # 是否启用演示数据重置（演示环境设置为 true）
    cron: "${DEMO_RESET_CRON:0 0 * * * ?}" # 重置执行时间（默认每小时整点）

# CORS 跨域配置（逗号分隔多个域名）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://aegis.example.cn}

logging:
  file:
    path: ./logs # 日志路径
  level:
    com.aegis: ${LOG_LEVEL:DEBUG}
    springfox.documentation.spring.web.readers.operation: ERROR
